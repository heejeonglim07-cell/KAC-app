<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#D35A82">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KAC 코칭 가이드">
<title>KAC 인증코치되기 · 코칭 프로세스 학습 가이드 (20분)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --primary:#D35A82; --primary-deep:#B8456E; --coral:#F0909E; --pink:#E0758F;
    --pink-light:#F6B8C6; --blush:#FCEFF2; --cream:#FAF6F4;
    --ink:#3D2F35; --muted:#8E7B82; --line:#F1E2E7; --card:#FFFFFF;
    --orchid:#B96A98; --plum:#8E5179; --rose:#C8517A;
    --font:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    --serif:"Georgia","Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);background:var(--cream);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1040px;margin:0 auto;padding:0 16px 70px;}
  .header{position:relative;overflow:hidden;border-radius:0 0 28px 28px;padding:34px 32px 30px;background:linear-gradient(135deg,#FBF6F4 0%,#FBEAEF 60%,#F8DEE6 100%);}
  .header-inner{position:relative;z-index:2;max-width:1040px;margin:0 auto;}
  .eyebrow{font-family:var(--serif);font-size:40px;font-weight:700;letter-spacing:3px;color:var(--pink-light);line-height:1;}
  .header h1{margin-top:6px;font-size:30px;font-weight:800;letter-spacing:-1px;color:var(--primary-deep);line-height:1.2;}
  .header .sub{margin-top:9px;font-size:13.5px;color:var(--muted);}
  .badge{display:inline-block;margin-top:16px;font-size:13px;font-weight:700;letter-spacing:1px;color:#fff;padding:8px 20px;border-radius:30px;background:linear-gradient(90deg,#F2A6AE,#E0708E);box-shadow:0 8px 18px -10px rgba(224,112,142,.7);}
  #bloom{position:absolute;right:-46px;top:-30px;width:330px;height:330px;z-index:1;opacity:.95;transform:rotate(-8deg);}
  @media(max-width:680px){#bloom{width:210px;height:210px;right:-50px;top:-10px;opacity:.55;} .header h1{font-size:22px;} .eyebrow{font-size:30px;}}
  .controls{position:sticky;top:0;z-index:20;background:rgba(250,246,244,.93);backdrop-filter:blur(8px);padding:16px 0 12px;margin-bottom:6px;border-bottom:1px solid var(--line);}
  .searchbar{position:relative;margin-bottom:12px;}
  .searchbar input{width:100%;padding:13px 44px;font-size:15px;font-family:var(--font);border:1.5px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);outline:none;transition:.15s;}
  .searchbar input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--blush);}
  .searchbar .ico{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;}
  .searchbar .clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px;display:none;}
  .toolrow{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .tabs{display:flex;flex-wrap:wrap;gap:6px;}
  .tab{font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:30px;border:1.5px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;transition:.15s;}
  .tab.active{color:#fff;border-color:transparent;}
  .tab[data-phase="all"].active{background:var(--ink);}
  .tab[data-phase="p1"].active{background:var(--rose);}
  .tab[data-phase="p2"].active{background:var(--pink);}
  .tab[data-phase="p3"].active{background:var(--orchid);}
  .tab[data-phase="p4"].active{background:var(--plum);}
  .spacer{flex:1;}
  .btn{font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:30px;border:1.5px solid var(--line);background:#fff;color:#6c5a60;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px;}
  .btn.on{background:var(--blush);border-color:var(--primary);color:var(--primary);}
  .progress{margin:14px 0 4px;display:flex;align-items:center;gap:12px;}
  .pbar{flex:1;height:9px;border-radius:9px;background:#F0E2E7;overflow:hidden;}
  .pbar i{display:block;height:100%;width:0;border-radius:9px;background:linear-gradient(90deg,#F2A6AE,var(--primary));transition:width .35s ease;}
  .ptxt{font-size:12.5px;font-weight:700;color:var(--primary);white-space:nowrap;}
  .reset{font-size:11.5px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;}
  .phase-h{display:flex;align-items:center;gap:11px;margin:26px 0 12px;flex-wrap:wrap;}
  .phase-h .tag{font-size:12px;font-weight:700;letter-spacing:.6px;color:#fff;padding:6px 14px;border-radius:30px;}
  .phase-h .time{font-size:12px;font-weight:600;padding:4px 11px;border-radius:30px;background:#fff;border:1.5px solid;}
  .phase-h .desc{font-size:12.5px;color:var(--muted);}
  .phase-h .ln{flex:1;height:2px;border-radius:2px;}
  .p1 .tag{background:var(--rose);} .p1 .time{color:var(--rose);border-color:var(--rose);} .p1 .ln{background:linear-gradient(90deg,var(--rose),transparent);}
  .p2 .tag{background:var(--pink);} .p2 .time{color:var(--pink);border-color:var(--pink);} .p2 .ln{background:linear-gradient(90deg,var(--pink),transparent);}
  .p3 .tag{background:var(--orchid);} .p3 .time{color:var(--orchid);border-color:var(--orchid);} .p3 .ln{background:linear-gradient(90deg,var(--orchid),transparent);}
  .p4 .tag{background:var(--plum);} .p4 .time{color:var(--plum);border-color:var(--plum);} .p4 .ln{background:linear-gradient(90deg,var(--plum),transparent);}
  .card{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:16px;margin-bottom:12px;box-shadow:0 10px 26px -20px rgba(176,90,120,.55);overflow:hidden;}
  .chead{display:flex;align-items:center;gap:12px;padding:17px 20px;cursor:pointer;user-select:none;}
  .num{width:34px;height:34px;flex-shrink:0;border-radius:10px;background:var(--accent);color:#fff;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;}
  .ctitle{flex:1;font-size:16px;font-weight:800;letter-spacing:-.3px;color:var(--ink);}
  .ctitle .cnote{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-top:2px;}
  .check{width:24px;height:24px;border-radius:50%;border:2px solid #e3cdd5;background:#fff;cursor:pointer;flex-shrink:0;position:relative;transition:.15s;}
  .check.on{background:var(--accent);border-color:var(--accent);}
  .check.on::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;}
  .copy{border:none;background:none;color:var(--muted);cursor:pointer;font-size:15px;padding:3px 6px;border-radius:6px;flex-shrink:0;}
  .copy:hover{background:var(--blush);color:var(--primary);}
  .chev{color:#d8c1c9;font-size:13px;transition:transform .2s;flex-shrink:0;}
  .card.collapsed .chev{transform:rotate(-90deg);}
  .cbody{padding:0 20px 20px 20px;}
  .card.collapsed .cbody{display:none;}
  ul.q{list-style:none;display:flex;flex-direction:column;gap:9px;}
  ul.q li{position:relative;padding-left:19px;font-size:14.5px;color:#473a3f;}
  ul.q li::before{content:"";position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:50%;background:var(--accent);}
  ul.q.script li::before{background:var(--rose);}
  .opt{font-weight:700;color:var(--accent);margin-right:4px;}
  .hint{color:var(--muted);font-size:13px;}
  .tool{display:inline-block;font-size:11px;font-weight:600;color:var(--primary-deep);background:var(--blush);border-radius:6px;padding:1px 7px;margin-left:3px;}
  mark{background:#FBD7A8;color:inherit;border-radius:3px;padding:0 1px;}
  .cols{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:12px;}
  .col{border:1px solid var(--line);border-radius:12px;padding:14px;background:#FFF9FB;}
  .col h4{font-size:13.5px;font-weight:800;margin-bottom:9px;display:flex;align-items:center;gap:7px;color:var(--ink);}
  .col h4 .d{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .col ul{list-style:none;display:flex;flex-direction:column;gap:7px;}
  .col li{position:relative;padding-left:14px;font-size:13px;color:#56474c;line-height:1.45;}
  .col li::before{content:"–";position:absolute;left:0;color:var(--muted);}
  .reveal-btn{font-size:13px;font-weight:600;color:var(--accent);background:transparent;border:1.5px dashed var(--accent);border-radius:10px;padding:11px 16px;width:100%;cursor:pointer;}
  .hidden{display:none !important;}
  .empty{text-align:center;padding:50px 20px;color:var(--muted);font-size:14px;}
  .foot{text-align:center;font-size:11.5px;color:var(--muted);margin-top:26px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:30px;opacity:0;pointer-events:none;transition:.25s;z-index:50;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  @media(max-width:680px){.cols{grid-template-columns:1fr;}.header h1{font-size:21px;}}
</style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="eyebrow">KAC</div>
      <h1>코칭 프로세스 학습 가이드</h1>
      <p class="sub">KAC 인증코치되기 · 한국코치협회 코칭 역량 기반 20분 세션 프로세스 질문</p>
      <span class="badge">20분 · 8단계</span>
    </div>
  </header>

  <div class="wrap">
    <div class="controls">
      <div class="searchbar">
        <span class="ico">🔍</span>
        <input id="search" type="text" placeholder="질문·키워드 검색 (예: 목표, 강점, 관점, 성과)">
        <button class="clr" id="clr" aria-label="검색어 지우기">✕</button>
      </div>
      <div class="toolrow">
        <div class="tabs" id="tabs">
          <button class="tab active" data-phase="all">전체</button>
          <button class="tab" data-phase="p1">시작</button>
          <button class="tab" data-phase="p2">탐색</button>
          <button class="tab" data-phase="p3">행동</button>
          <button class="tab" data-phase="p4">실행·마무리</button>
        </div>
        <span class="spacer"></span>
        <button class="btn" id="toggleAll">⊟ 모두 접기</button>
        <button class="btn" id="review">🎯 복습 모드</button>
      </div>
      <div class="progress">
        <span class="pbar"><i id="pfill"></i></span>
        <span class="ptxt" id="ptxt">학습 0 / 8 단계</span>
        <button class="reset" id="reset">초기화</button>
      </div>
    </div>
    <div id="content"></div>
    <p class="foot">KAC 코칭 프로세스 질문 가이드 (20분) · 한국코치협회 코칭 역량 기반</p>
  </div>

  <div class="toast" id="toast"></div>

<script>
const PHASES = [
  { id:'p1', tag:'STEP BACK · 시작', time:'1~2분', desc:'신뢰의 장을 열고 마음을 정돈하기', cls:'p1', accent:'var(--rose)',
    steps:[
      { num:1, title:'친밀감(Rapport) 형성하기', blocks:[ { type:'list', script:true, items:[
        {t:'안녕하세요, 반갑습니다. OOO 코치입니다.'},
        {t:'오늘 저와 20분 코칭을 진행할 텐데요, 제가 호칭을 어떻게 불러 드리면 될까요?'},
        {t:'네~ 알겠습니다. OOO 님으로 불러 드리겠습니다.'},
        {t:'지금부터 저희가 나누는 대화는 한국코치협회 윤리규정과 개인정보 보호법에 따라 비밀이 철저히 보장되니 편안하게 말씀하시면 되겠습니다. 괜찮으실까요?'}
      ]} ] },
      { num:2, title:'한 주간 의미(기억) 있었던 경험', note:'코치가 긍정 반응 · 인정 · 칭찬 · 지지 · 반영해 준다.', blocks:[ { type:'list', items:[
        {t:'OOO 님, 한 주간 의미(기억) 있었던 경험이 있었다면?'},
        {t:'오늘 ~~한 마음으로 코칭 대화를 시작하려고 하는데 가능하실까요?'}
      ]} ] }
    ] },
  { id:'p2', tag:'THINK BY QUESTIONS · 탐색', time:'2~12분', desc:'질문으로 주제를 탐색하고 관점을 확장하기', cls:'p2', accent:'var(--pink)',
    steps:[
      { num:3, title:'코칭 주제 및 목표를 탐색하고 합의하기', blocks:[ { type:'list', items:[
        {t:'오늘 어떤 주제로 대화하시고 싶으신가요?'},
        {opt:'옵션 1',t:'~~~를 코칭 주제로 생각하신 계기가(배경이) 있다면?'},
        {opt:'옵션 2',t:'~~~에 대하여 조금 더 이야기해 주시겠습니까?'},
        {hint:'(주제가 분명하지 않을 경우)',t:'오늘 다루고 싶은 주제를 정리해 볼 수 있을까요?'},
        {t:'~~~가 고객님의 삶에 어떤 의미가 있는가요?'},
        {t:'~~ 의미가 고객님에게 중요한 이유는 무엇인가요?'},
        {t:'~~ 부분에서 중요함을 알게 된다면 고객님의 어떤 부분이 도움이 될까요?'},
        {t:'~~ 찾는다면(도움을 얻는다면) 지금의 주제가 어떻게 보이세요?'},
        {t:'오늘 대화가 끝났을 때 주제에 대해 어떤 상태가 되면 코칭 세션이 만족스러울까요?'},
        {t:'오늘 코칭 세션에서 성취하고자 하는 목표를 명료하게 정리할 수 있을까요?'},
        {t:'지금 말씀하신 “~~”를 목표로 코칭 대화를 시작해도 될까요?'}
      ]} ] },
      { num:4, title:'(의식 확장) 알아차림과 통찰을 통하여 관점을 전환·재구성', blocks:[
        { type:'list', items:[
          {t:'지금 마음/기분은 어떤가요?', hint:'(공감)'},
          {t:'(목표)에 대해 현재 상태는 어떤 상태인가요?', tool:'이미지 / 점수 / 100M 상공 활용'},
          {t:'(현재 상태)인데 원하는 상태는 어떤 상태인가요?', tool:'이미지 / 점수 / 100M 상공 활용'},
          {opt:'관점 전환 질문',t:'아래 세 가지 관점 중 선택해 탐색'}
        ]},
        { type:'cols', cols:[
          { dot:'var(--rose)', title:'옵션 1) 미래의 상상', items:['잠깐 원하는 것을 이루었을 때를 상상해 보았으면 하는데요, 가능할까요?','어떤 이미지/상태/장면이 떠오르시나요?','그 장소는 어디인가요?','무엇을 하고 있나요?','누구와 있나요?'] },
          { dot:'var(--pink)', title:'옵션 2) 과거의 경험', items:['과거에 (목표)와 관련해 성공했던 경험이 있다면 어떤 것이 있을까요?','그때 자신의 어떤 강점이 발휘되었나요?','이 강점을 통해서 (목표)를 바라봤을 때 어떤 마음이 드시나요?','강점을 발휘할 수 있었던 내면의 힘은 무엇인가요?'] },
          { dot:'var(--orchid)', title:'옵션 3) 타인의 관점', items:['다른 사람(혹은 존경하는 사람, 멘토 등)의 관점에서 생각해 보았으면 하는데요, 괜찮을까요?','지금 (목표)와 관련해서 떠오르는 사람이 있다면 누구인가요?','그분이 나의 이 상황을 본다면 뭐라고 말해 줄 것 같나요?'] }
        ]}
      ] },
      { num:5, title:'(의식 확장) 존재 가치', blocks:[ { type:'list', items:[
        {t:'지금까지 말씀하시면서 어떤 마음/느낌이 드나요?'},
        {t:'고객님께서 (대상)에게 어떤 도움을 주고 싶으세요?'},
        {t:'고객님의 목표를 달성하기 위해서 내면에는 어떤 변화가 일어나면 좋을까요?'},
        {t:'우리 고객님께는 어떤 가치가 필요할까요?'},
        {t:'이런 가치를 실현하는 고객님은 어떤 분인가요?'},
        {t:'( ) 삶을 살아가고 있을 나 자신에게 어떤 말을 해 주고 싶으세요?'},
        {t:'지금까지 대화에서 알아차린 것/느낀 것/발견한 것이 있다면 무엇인가요?'}
      ]} ] }
    ] },
  { id:'p3', tag:'OPTIONS · 행동 설계', time:'12~16분', desc:'알아차림을 바탕으로 행동을 설계하기', cls:'p3', accent:'var(--orchid)',
    steps:[
      { num:6, title:'(성장 지원) 행동 설계 및 실행', blocks:[ { type:'list', items:[
        {t:'(코칭의 목표 연관)을 위해 알아차린 것/느낀 것/발견한 것을 바탕으로 무엇을 해 보고 싶으신가요?'},
        {t:'또 어떤 것을 실행해 볼 수 있을까요?'},
        {t:'말씀하신 것 중에서 어떤 것부터 실행해 볼 수 있을까요?'}
      ]} ] }
    ] },
  { id:'p4', tag:'PROCEED THE GOAL · 실행·마무리', time:'16~20분', desc:'후원 환경을 마련하고 성과를 확인하며 마무리하기', cls:'p4', accent:'var(--plum)',
    steps:[
      { num:7, title:'(성장 지원) 실행 계획을 실천할 수 있는 후원 환경 마련 및 성과 확인', blocks:[ { type:'cols', cols:[
        { dot:'var(--plum)', title:'실행 첫걸음', items:['(실행)을 위해 첫 번째로 해야 할 것은 무엇인가요?','언제 하시겠습니까?','어떻게 하실 건가요?','실행하시는 데 예상되는 어려움은 무엇인가요?'] },
        { dot:'var(--rose)', title:'지원 환경 마련', items:['(어려움)을 해결하는 데 자신의 (강점/마음/가치) 등(들)을 활용한다면 도움이 될까요?','실행했다는 것을 고객님 스스로 어떻게 점검해 볼 수 있을까요?','실행하려고 하는 것을 누구에게 알리면 실행력이 높아질까요?'] },
        { dot:'var(--pink)', title:'성과 확인', items:['오늘 코칭 전과 비교해서 어떤 성과가 있으셨을까요?','성취한 자신에게 어떤 이야기를 해 주고 싶으세요?'] }
      ]} ] },
      { num:8, title:'(전문 개발) 세션의 시작과 종료 시 고객의 동의', blocks:[ { type:'list', items:[
        {t:'더 나눌 말씀이 있을까요?'},
        {t:'그러면 코칭 대화를 마무리해도 될까요?'}
      ]} ] }
    ] }
];
const TOTAL_STEPS = PHASES.reduce((n,p)=>n+p.steps.length,0);
const Store = { mem:{}, async get(k){ try{ const r=await window.storage.get(k); return r?r.value:null; }catch(e){ return (k in this.mem)?this.mem[k]:null; } }, async set(k,v){ try{ await window.storage.set(k,v); }catch(e){ this.mem[k]=v; } } };
const KEY='kac:learned';
let learned = {}; let state = { phase:'all', query:'', review:false, allCollapsed:false };
const esc = s => s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function hl(s){ if(!state.query) return esc(s); const q=state.query.trim(); if(!q) return esc(s); const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'); return esc(s).replace(re,'<mark>$1</mark>'); }
function itemText(it){ if(typeof it==='string') return it; return [it.opt,it.hint,it.t,it.tool].filter(Boolean).join(' '); }
function stepText(st){ let a=[st.title,st.note||'']; st.blocks.forEach(b=>{ if(b.type==='list') b.items.forEach(it=>a.push(itemText(it))); if(b.type==='cols') b.cols.forEach(c=>{a.push(c.title); c.items.forEach(i=>a.push(i));}); }); return a.join(' '); }
function matches(st){ if(!state.query) return true; return stepText(st).toLowerCase().includes(state.query.toLowerCase()); }
function renderItem(it){ if(typeof it==='string') it={t:it}; let s=''; if(it.opt)s+=`<span class="opt">${hl(it.opt)}</span>`; if(it.hint)s+=`<span class="hint">${hl(it.hint)}</span> `; s+=hl(it.t||''); if(it.tool)s+=` <span class="tool">${hl(it.tool)}</span>`; return `<li>${s}</li>`; }
function renderBody(st){ let h=''; st.blocks.forEach(b=>{ if(b.type==='list'){ h+=`<ul class="q${b.script?' script':''}">`+b.items.map(renderItem).join('')+`</ul>`; } else if(b.type==='cols'){ h+=`<div class="cols">`+b.cols.map(c=>`<div class="col"><h4><span class="d" style="background:${c.dot}"></span>${hl(c.title)}</h4><ul>`+c.items.map(i=>`<li>${hl(i)}</li>`).join('')+`</ul></div>`).join('')+`</div>`; } }); return h; }
function render(){
  const root=document.getElementById('content'); root.innerHTML=''; let vis=0;
  PHASES.forEach(p=>{
    if(state.phase!=='all'&&state.phase!==p.id) return;
    const steps=p.steps.filter(matches); if(!steps.length) return;
    const ph=document.createElement('div'); ph.className='phase-h '+p.cls;
    ph.innerHTML=`<span class="tag">${p.tag}</span><span class="time">${p.time}</span><span class="desc">${p.desc}</span><span class="ln"></span>`;
    root.appendChild(ph);
    steps.forEach(st=>{
      vis++; const done=!!learned[st.num];
      const card=document.createElement('div'); card.className='card'+(state.allCollapsed?' collapsed':''); card.style.setProperty('--accent',p.accent);
      const body=renderBody(st); const rev=state.review&&!state.query;
      const inner=rev?`<div class="reveal"><button class="reveal-btn" data-act="reveal">질문 떠올려 본 뒤 눌러 정답 질문 보기 ▾</button><div class="hidden">${body}</div></div>`:body;
      card.innerHTML=`<div class="chead" data-act="toggle"><span class="num">${st.num}</span><span class="ctitle">${hl(st.title)}${st.note?`<span class="cnote">${hl(st.note)}</span>`:''}</span><button class="copy" data-act="copy" title="이 단계 질문 복사">📋</button><span class="check${done?' on':''}" data-act="check" title="학습 완료 표시"></span><span class="chev">▾</span></div><div class="cbody">${inner}</div>`;
      card.querySelector('[data-act="toggle"]').addEventListener('click',e=>{ if(e.target.closest('[data-act="check"]')||e.target.closest('[data-act="copy"]')) return; card.classList.toggle('collapsed'); });
      card.querySelector('[data-act="check"]').addEventListener('click',e=>{ e.stopPropagation(); learned[st.num]=!learned[st.num]; Store.set(KEY,JSON.stringify(learned)); card.querySelector('.check').classList.toggle('on'); updateProgress(); });
      card.querySelector('[data-act="copy"]').addEventListener('click',e=>{ e.stopPropagation(); navigator.clipboard.writeText(`[${st.num}. ${st.title}]\n`+plainLines(st)).then(()=>toast('질문을 복사했습니다')); });
      const r=card.querySelector('[data-act="reveal"]'); if(r) r.addEventListener('click',()=>{ r.nextElementSibling.classList.remove('hidden'); r.classList.add('hidden'); });
      root.appendChild(card);
    });
  });
  if(!vis) root.innerHTML=`<div class="empty">🔎 “${esc(state.query)}”에 해당하는 질문이 없습니다.<br>다른 키워드로 검색해 보세요.</div>`;
  updateProgress();
}
function plainLines(st){ let L=[]; st.blocks.forEach(b=>{ if(b.type==='list') b.items.forEach(it=>{ const o=(typeof it==='string')?{t:it}:it; L.push('• '+[o.opt&&'['+o.opt+']',o.hint,o.t,o.tool&&'('+o.tool+')'].filter(Boolean).join(' ')); }); if(b.type==='cols') b.cols.forEach(c=>{ L.push('▪ '+c.title); c.items.forEach(i=>L.push('  - '+i)); }); }); return L.join('\n'); }
function updateProgress(){ const n=Object.values(learned).filter(Boolean).length; document.getElementById('pfill').style.width=(n/TOTAL_STEPS*100)+'%'; document.getElementById('ptxt').textContent=`학습 ${n} / ${TOTAL_STEPS} 단계`; }
let toastTimer; function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1600); }
document.getElementById('tabs').addEventListener('click',e=>{ const b=e.target.closest('.tab'); if(!b) return; document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); b.classList.add('active'); state.phase=b.dataset.phase; render(); });
const search=document.getElementById('search'), clr=document.getElementById('clr');
search.addEventListener('input',()=>{ state.query=search.value; clr.style.display=search.value?'block':'none'; render(); });
clr.addEventListener('click',()=>{ search.value=''; state.query=''; clr.style.display='none'; search.focus(); render(); });
document.getElementById('toggleAll').addEventListener('click',e=>{ state.allCollapsed=!state.allCollapsed; e.target.textContent=state.allCollapsed?'⊞ 모두 펼치기':'⊟ 모두 접기'; render(); });
document.getElementById('review').addEventListener('click',e=>{ state.review=!state.review; e.target.classList.toggle('on',state.review); e.target.textContent=state.review?'🎯 복습 모드 ON':'🎯 복습 모드'; if(state.review){ state.allCollapsed=false; document.getElementById('toggleAll').textContent='⊟ 모두 접기'; } render(); });
document.getElementById('reset').addEventListener('click',()=>{ if(confirm('학습 진도 체크를 모두 초기화할까요?')){ learned={}; Store.set(KEY,JSON.stringify(learned)); render(); toast('진도를 초기화했습니다'); } });
(async function init(){ const saved=await Store.get(KEY); if(saved){ try{ learned=JSON.parse(saved)||{}; }catch(e){ learned={}; } } render(); })();
</script>
</body>
